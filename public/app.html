<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CryptoSphere — Markets</title>
<meta name="description" content="A modern cryptocurrency marketplace: live markets, trending coins, exchanges, categories and BTC holders." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css" />
<style>
:root{
  --bg:#0A0A0B; --bg-2:#111113; --bg-3:#18181B;
  --border:rgba(255,255,255,0.07); --border-2:rgba(255,255,255,0.12);
  --text:#FAFAFA; --text-2:#A1A1AA; --text-3:#52525B;
  --blue:#3B82F6; --green:#22C55E; --red:#EF4444; --amber:#F59E0B; --purple:#8B5CF6;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --radius:12px;
  --shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 10px 30px rgba(0,0,0,0.35);
}
[data-theme="light"]{
  --bg:#FAFAFA; --bg-2:#FFFFFF; --bg-3:#F4F4F5;
  --border:rgba(0,0,0,0.07); --border-2:rgba(0,0,0,0.12);
  --text:#0A0A0B; --text-2:#52525B; --text-3:#A1A1AA;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}
h1,h2,h3{margin:0;line-height:1.2;letter-spacing:-0.02em;font-weight:600}
h1{font-size:24px}
h2{font-size:20px}
.mono{font-family:var(--mono)}
.muted{color:var(--text-2)}
.dim{color:var(--text-3)}
.up{color:var(--green)} .down{color:var(--red)}

/* Layout */
.app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{
  position:sticky;top:0;height:100vh;border-right:1px solid var(--border);
  background:var(--bg);display:flex;flex-direction:column;padding:20px 12px;gap:6px;z-index:30;
}
.brand{display:flex;align-items:center;gap:10px;padding:8px 10px 18px}
.brand-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);box-shadow:0 0 14px 2px rgba(59,130,246,0.7)}
.brand-name{font-weight:500;letter-spacing:-0.01em}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.nav a{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--text-2);
  border-left:2px solid transparent;transition:background .15s ease,color .15s ease;font-weight:500;
}
.nav a i{font-size:18px}
.nav a:hover{background:rgba(255,255,255,0.04);color:var(--text)}
[data-theme="light"] .nav a:hover{background:rgba(0,0,0,0.04)}
.nav a.active{background:rgba(59,130,246,0.08);color:var(--text);border-left-color:var(--blue);border-radius:0 8px 8px 0;padding-left:14px}
.sidebar-footer{margin-top:auto;display:flex;justify-content:space-between;align-items:center;padding:10px}
.icon-btn{
  width:36px;height:36px;border-radius:8px;border:1px solid var(--border);
  display:inline-flex;align-items:center;justify-content:center;color:var(--text-2);transition:.15s;
}
.icon-btn:hover{background:var(--bg-3);color:var(--text)}

.main{display:flex;flex-direction:column;min-width:0}
.ticker{border-bottom:1px solid var(--border);background:var(--bg-2)}
.ticker > div{height:46px}
.header{
  position:sticky;top:0;z-index:20;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;
  padding:14px 32px;border-bottom:1px solid var(--border);
  background:color-mix(in oklab, var(--bg) 70%, transparent);backdrop-filter:blur(12px);
}
.page-title{font-size:16px;font-weight:600}
.search-wrap{position:relative;justify-self:center;width:380px;max-width:100%}
.search{
  width:100%;height:40px;border-radius:9999px;border:1px solid var(--border);background:var(--bg-2);
  color:var(--text);padding:0 16px 0 40px;font-size:14px;transition:border-color .15s;
}
.search:focus{border-color:var(--border-2);outline:none}
.search-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:16px}
.header-right{display:flex;align-items:center;gap:10px;justify-self:end}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#8B5CF6)}

/* Dropdown */
.search-dd{
  position:absolute;top:48px;left:0;right:0;background:var(--bg-2);border:1px solid var(--border-2);
  border-radius:12px;box-shadow:var(--shadow);padding:8px;display:none;opacity:0;transform:translateY(-4px);
  transition:opacity .15s ease, transform .15s ease;max-height:60vh;overflow:auto;
}
.search-dd.open{display:block;opacity:1;transform:translateY(0)}
.dd-section{padding:8px 10px 4px;color:var(--text-3);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.dd-row{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:8px;border-left:2px solid transparent;cursor:pointer}
.dd-row:hover, .dd-row.active{background:rgba(59,130,246,0.08);border-left-color:var(--blue)}
.dd-row img{width:32px;height:32px;border-radius:50%}
.dd-name{font-weight:500}
.dd-sym{color:var(--text-2);font-size:12px;margin-left:6px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:500}
.badge-type{margin-left:auto;background:var(--bg-3);color:var(--text-2);border:1px solid var(--border)}
.badge-up{background:rgba(34,197,94,0.15);color:var(--green)}
.badge-down{background:rgba(239,68,68,0.15);color:var(--red)}
.badge-amber{background:rgba(245,158,11,0.15);color:var(--amber)}

/* Content */
.content{padding:28px 32px 80px;max-width:1280px;width:100%;margin:0 auto;animation:pageIn .2s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px}
.stat-label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-2);margin-bottom:10px}
.stat-value{font-family:var(--mono);font-size:24px;font-weight:600}
.stat-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:6px}

.section-head{display:flex;align-items:center;justify-content:space-between;margin:32px 0 14px}
.section-head h2{font-size:18px}
.section-head .label{color:var(--amber);font-weight:500}

.scroller{position:relative}
.scroller .strip{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding:4px 2px}
.scroller .strip::-webkit-scrollbar{display:none}
.scroller::before, .scroller::after{content:"";position:absolute;top:0;bottom:0;width:48px;pointer-events:none;z-index:1}
.scroller::before{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.scroller::after{right:0;background:linear-gradient(270deg,var(--bg),transparent)}
.trend-card{
  flex:0 0 auto;min-width:170px;background:var(--bg-3);border:1px solid var(--border);
  border-radius:12px;padding:16px;position:relative;transition:transform .15s, border-color .15s;
}
.trend-card:hover{border-color:var(--border-2);transform:translateY(-2px)}
.trend-rank{position:absolute;top:10px;right:10px;font-size:10px;background:rgba(245,158,11,0.15);color:var(--amber);padding:2px 7px;border-radius:9999px;font-weight:500}
.trend-coin{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.trend-coin img{width:28px;height:28px;border-radius:50%}
.trend-name{font-weight:500;font-size:13px}
.trend-sym{color:var(--text-2);font-size:11px}
.trend-price{font-family:var(--mono);font-weight:600;font-size:16px;margin-bottom:6px}

/* Table */
.table-wrap{margin-top:8px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table{width:100%;border-collapse:collapse}
.table thead th{
  position:sticky;top:60px;z-index:5;background:color-mix(in oklab,var(--bg-2) 80%,transparent);
  backdrop-filter:blur(8px);text-align:left;padding:14px 16px;font-size:12px;color:var(--text-2);font-weight:500;
  text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);
}
.table tbody td{padding:0 16px;height:56px;border-bottom:1px solid var(--border);vertical-align:middle}
.table tbody tr{transition:background .15s}
.table tbody tr:hover{background:rgba(255,255,255,0.03)}
[data-theme="light"] .table tbody tr:hover{background:rgba(0,0,0,0.03)}
.coin-cell{display:flex;align-items:center;gap:12px}
.coin-cell img{width:32px;height:32px;border-radius:50%}
.coin-cell .nm{font-weight:500}
.coin-cell .sm{color:var(--text-2);font-size:12px;margin-left:6px}
.num{font-family:var(--mono)}
.pill{display:inline-block;padding:3px 8px;border-radius:9999px;font-size:12px;font-weight:500}
.pill.up{background:rgba(34,197,94,0.15);color:var(--green)}
.pill.down{background:rgba(239,68,68,0.15);color:var(--red)}

.spark{display:block}

.flash{animation:flash .6s ease}
@keyframes flash{0%{background:rgba(245,158,11,0.3)}100%{background:transparent}}

/* pagination */
.pager{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
.btn{
  border:1px solid var(--border);background:transparent;color:var(--text);
  padding:8px 12px;border-radius:8px;font-size:13px;transition:.15s;display:inline-flex;align-items:center;gap:6px;
}
.btn:hover{background:var(--bg-3);border-color:var(--border-2)}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn-blue{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-blue:hover{background:#2563eb}
.select{appearance:none;background:transparent;border:1px solid var(--border);color:var(--text);padding:7px 28px 7px 10px;border-radius:8px;font-size:13px}

/* Toast */
.toasts{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:100}
.toast{background:var(--bg-2);border:1px solid var(--border-2);padding:12px 14px;border-radius:10px;min-width:240px;box-shadow:var(--shadow);animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Scroll top */
.scroll-top{position:fixed;right:24px;bottom:24px;width:44px;height:44px;border-radius:50%;background:var(--bg-2);border:1px solid var(--border-2);display:none;align-items:center;justify-content:center;box-shadow:var(--shadow);z-index:50}
.scroll-top.show{display:inline-flex}

/* Skeleton */
.skel{position:relative;overflow:hidden;background:var(--bg-3);border-radius:6px}
.skel::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent, rgba(255,255,255,0.06), transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}

/* Mobile */
.menu-btn{display:none}
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:25}
.backdrop.open{display:block}

@media (max-width:1280px){.content{padding:24px}}
@media (max-width:1024px){
  .app{grid-template-columns:64px 1fr}
  .sidebar{padding:20px 8px}
  .brand-name, .nav a span{display:none}
  .nav a{justify-content:center;padding:10px}
  .stats{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;width:240px;transform:translateX(-100%);transition:transform .25s ease;padding:20px 12px}
  .sidebar.open{transform:translateX(0)}
  .sidebar .brand-name, .sidebar .nav a span{display:inline}
  .sidebar .nav a{justify-content:flex-start;padding:9px 12px}
  .menu-btn{display:inline-flex}
  .header{grid-template-columns:auto 1fr auto;padding:12px 16px}
  .search-wrap{width:auto}
  .content{padding:16px 16px 80px}
  .table thead{display:none}
  .table, .table tbody, .table tr, .table td{display:block;width:100%}
  .table tbody tr{padding:14px 16px;border-bottom:1px solid var(--border)}
  .table tbody td{height:auto;padding:4px 0;border:0;display:flex;justify-content:space-between;gap:12px}
  .table tbody td::before{content:attr(data-label);color:var(--text-2);font-size:12px;text-transform:uppercase;letter-spacing:.06em}
}

/* Coin detail */
.coin-detail{display:grid;grid-template-columns:2fr 3fr;gap:24px}
@media (max-width:1024px){.coin-detail{grid-template-columns:1fr}}
.coin-header{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.coin-header img{width:64px;height:64px;border-radius:50%}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.price-grid .card{padding:14px 16px}
.supply-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.supply-bar > div{height:100%;background:var(--blue)}
.link-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.tabs{display:flex;gap:6px;margin-top:12px}
.tabs button{padding:7px 14px;border-radius:9999px;background:transparent;color:var(--text-2);border:1px solid transparent}
.tabs button.active{background:var(--blue);color:#fff}
.chart-frame{height:420px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}

/* Exchanges / Categories grid */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media (max-width:1024px){.grid-3{grid-template-columns:repeat(2,1fr)}}
@media (max-width:640px){.grid-3{grid-template-columns:1fr}}
.ex-card{padding:20px;border-radius:16px}
.ex-top{display:flex;align-items:center;gap:12px}
.ex-top img{width:40px;height:40px;border-radius:8px;background:var(--bg-3)}
.trust-bar{height:4px;background:var(--border);border-radius:2px;margin:14px 0;overflow:hidden}
.trust-bar > div{height:100%;background:var(--blue)}
.ex-stats{display:flex;justify-content:space-between;font-size:12px;color:var(--text-2)}
.cat-card.active{border-color:var(--blue);background:color-mix(in oklab, var(--blue) 5%, var(--bg-2))}
</style>
</head>

<div class="backdrop" id="backdrop"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="brand-dot"></span><span class="brand-name">CryptoSphere</span></div>

  <div class="main">

      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
      </div>
    </div>

    <header class="header">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="icon-btn menu-btn" id="menuBtn" aria-label="Open menu"><i class="ti ti-menu-2"></i></button>
        <div class="page-title" id="pageTitle">Markets</div>
      </div>
      <div class="search-wrap">
        <i class="ti ti-search"></i>

    <main class="content" id="view"></main>

</div>

<div class="toasts" id="toasts" aria-live="polite"></div>
<button class="scroll-top icon-btn" id="scrollTop" aria-label="Scroll to top"><i class="ti ti-arrow-up"></i></button>

const fallbackCategories = ['Layer 1', 'Layer 2', 'DeFi', 'Memes', 'Stablecoins', 'AI', 'NFT', 'Gaming'];
function getCoinCategory(symbol, name) {
  const symLower = symbol.toLowerCase();
  const nameLower = name.toLowerCase();
  if (COIN_CATEGORIES[symLower]) return COIN_CATEGORIES[symLower];
  
  if (symLower.includes('doge') || symLower.includes('shib') || symLower.includes('pepe') || symLower.includes('floki') || symLower.includes('meme')) {
    return 'Memes';
  }
  if (symLower.includes('usd') || symLower.includes('eur') || symLower.includes('dai')) {
    return 'Stablecoins';
  }
  if (nameLower.includes('layer 2') || nameLower.includes('optimistic') || nameLower.includes('rollup')) {
    return 'Layer 2';
  }
  if (nameLower.includes('defi') || nameLower.includes('yield') || nameLower.includes('finance')) {
    return 'DeFi';
  }
  if (nameLower.includes('game') || nameLower.includes('play') || nameLower.includes('metaverse')) {
    return 'Gaming';
  }
  if (nameLower.includes('ai ') || nameLower.includes('artificial') || nameLower.includes('intelligence')) {
    return 'AI';
  }
  
  const index = (name.length + symbol.charCodeAt(0)) % fallbackCategories.length;
  return fallbackCategories[index];
}

async function fetchLiveCoins() {
  try {
    const res = await fetch('https://api.coincap.io/v2/assets?limit=250');
    const json = await res.json();
    if (json && json.data) {
      COINS = json.data.map((asset, index) => {
        const price = parseFloat(asset.priceUsd) || 0;
        const h24 = parseFloat(asset.changePercent24Hr) || 0;
        const cap = parseFloat(asset.marketCapUsd) || 0;
        const vol = parseFloat(asset.volumeUsd24Hr) || 0;
        const symbol = asset.symbol || "";
        const rank = index + 1;
        return {
          id: asset.id,
          name: asset.name,
          symbol: symbol,
          price: price,
          h24: h24,
          d7: h24 + (Math.sin(rank) * 1.5),
          cap: cap,
          vol: vol,
          img: `https://assets.coincap.io/assets/icons/${symbol.toLowerCase()}@2x.png`
        };
      });
      updateLiveCategories();
      refreshActiveView();
    }
  } catch (err) {
    console.error("Error fetching live coins:", err);
  }
}

function updateLiveCategories() {
  const categoryStats = {};
  CATEGORIES.forEach(cat => {
    categoryStats[cat.name] = { totalCap: 0, weightedChangeSum: 0, totalWeight: 0 };
  });
  
  COINS.forEach(c => {
    const catName = getCoinCategory(c.symbol, c.name);
    if (catName && categoryStats[catName]) {
      const cap = c.cap || 0;
      const change = c.h24 || 0;
      categoryStats[catName].totalCap += cap;
      categoryStats[catName].weightedChangeSum += (change * cap);
      categoryStats[catName].totalWeight += cap;
    }
  });
  
  CATEGORIES.forEach(cat => {
    const stats = categoryStats[cat.name];
    if (stats && stats.totalWeight > 0) {
      cat.cap = stats.totalCap;
      cat.h24 = stats.weightedChangeSum / stats.totalWeight;
    }
  });
}

async function fetchLiveExchanges() {
  try {
    const res = await fetch('https://api.coincap.io/v2/exchanges');
    const json = await res.json();
    if (json && json.data) {
      const btcPrice = COINS.find(c => c.symbol === 'BTC')?.price || 67000;
      EXCHANGES = json.data.slice(0, 9).map(ex => {
        const id = ex.id;
        const name = ex.name;
        const rank = parseInt(ex.rank) || 1;
        const volUsd = parseFloat(ex.volumeUsd) || 0;
        const volBtc = volUsd / btcPrice;
        const trust = rank <= 3 ? 10 : (rank <= 8 ? 9 : 8);
        const details = EXCHANGE_DETAILS[id] || { country: 'Global', year: 2018, url: ex.exchangeUrl || `https://${id}.com` };
        return {
          name: name,
          trust: trust,
          vol: volBtc,
          country: details.country,
          year: details.year,
          url: details.url
        };
      });
      refreshActiveView();
    }
  } catch (err) {
    console.error("Error fetching live exchanges:", err);
  }
}

const nfmt = new Intl.NumberFormat('en-US',{maximumFractionDigits:2});
const cfmt = new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2});
const pfmt = (n)=> (n>=0?'+':'') + n.toFixed(2) + '%';
function fmtBig(n){
  if(n>=1e12) return '$'+(n/1e12).toFixed(2)+'T';
  if(n>=1e9) return '$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  return cfmt.format(n);
}
function fmtPrice(p){
  if(p<0.01) return '$'+p.toFixed(8);
  if(p<1) return '$'+p.toFixed(4);
  return cfmt.format(p);
}

function drawSpark(canvas){
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const positive = canvas.dataset.positive==='1';
  const seed = +canvas.dataset.seed;
  const pts = [];
  let rng = seed;
  for(let i=0;i<20;i++){ rng = (rng*9301+49297)%233280; pts.push(rng/233280); }
  if(positive){ pts.sort((a,b)=>a-b - 0); }
  const color = positive ? '#22C55E' : '#EF4444';
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x = (i/(pts.length-1))*w;
    const y = h - p*h*0.8 - h*0.1;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = color; ctx.lineWidth=1.5; ctx.stroke();
  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
  ctx.fillStyle = color+'26'; ctx.fill();
}

function miniStat(l,v){return `<div class="card"><div class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.06em">${l}</div><div class="num" style="font-size:18px;margin-top:6px">${v}</div></div>`}

function injectTVChart(sym){
  const host = document.getElementById('chart');
  if(!host) return;
  host.innerHTML = '<div class="tradingview-widget-container" style="height:100%"><div class="tradingview-widget-container__widget" style="height:100%"></div></div>';
  const s = document.createElement('script');
  s.src='https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
  s.async=true;
  s.innerHTML = JSON.stringify({
    autosize:true, symbol:'BINANCE:'+sym+'USDT', interval:'60', theme:'dark',
    style:'1', locale:'en', allow_symbol_change:false, hide_top_toolbar:false, save_image:false
  });
  host.querySelector('.tradingview-widget-container').appendChild(s);
}

/* ---------- Search dropdown ---------- */
const dd = document.getElementById('searchDd');
const search = document.getElementById('search');
let ddIndex = -1, ddResults = [];
search.addEventListener('input', ()=>{
  const q = search.value.trim().toLowerCase();
  if(!q){ dd.classList.remove('open'); dd.innerHTML=''; return; }
  const coins = COINS.filter(c=>c.name.toLowerCase().includes(q)||c.symbol.toLowerCase().includes(q)).slice(0,5);
  const ex = EXCHANGES.filter(e=>e.name.toLowerCase().includes(q)).slice(0,3);
  const nf = NFTS.filter(n=>n.name.toLowerCase().includes(q)).slice(0,3);
  ddResults = [];
  let html = '';
  if(coins.length){ html += '<div class="dd-section">Coins</div>'; coins.forEach(c=>{ddResults.push({type:'coin',id:c.id}); html+=`<div class="dd-row" data-href="#/coin/${c.id}"><img src="${c.img}" alt=""/><div><span class="dd-name">${c.name}</span><span class="dd-sym">${c.symbol}</span></div><span class="badge badge-type">Coin</span></div>`}); }
  if(ex.length){ html += '<div class="dd-section">Exchanges</div>'; ex.forEach(e=>{ddResults.push({type:'ex'}); html+=`<div class="dd-row"><div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-weight:600">${e.name[0]}</div><div><span class="dd-name">${e.name}</span></div><span class="badge badge-type">Exchange</span></div>`}); }
  if(nf.length){ html += '<div class="dd-section">NFTs</div>'; nf.forEach(n=>{ddResults.push({type:'nft'}); html+=`<div class="dd-row"><img src="${n.img}" alt=""/><div><span class="dd-name">${n.name}</span><span class="dd-sym">${n.symbol}</span></div><span class="badge badge-type">NFT</span></div>`}); }
  if(!html) html = '<div class="dd-section">No results</div>';
  dd.innerHTML = html;
  dd.classList.add('open');
  ddIndex = -1;
  dd.querySelectorAll('.dd-row').forEach(r=>r.onclick=()=>{ if(r.dataset.href){location.hash=r.dataset.href;} search.value=''; dd.classList.remove('open');});
});
search.addEventListener('keydown', e=>{
  const rows = dd.querySelectorAll('.dd-row');
  if(e.key==='ArrowDown'){e.preventDefault(); ddIndex=Math.min(rows.length-1,ddIndex+1); rows.forEach((r,i)=>r.classList.toggle('active',i===ddIndex));}
  else if(e.key==='ArrowUp'){e.preventDefault(); ddIndex=Math.max(0,ddIndex-1); rows.forEach((r,i)=>r.classList.toggle('active',i===ddIndex));}
  else if(e.key==='Enter'){if(rows[ddIndex])rows[ddIndex].click();}
  else if(e.key==='Escape'){dd.classList.remove('open');}
});
document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) dd.classList.remove('open'); });

/* ---------- Theme ---------- */
document.getElementById('themeBtn').onclick = ()=>{
  const html = document.documentElement;
  const next = html.dataset.theme==='light' ? 'dark' : 'light';
  html.dataset.theme = next;
  document.querySelector('#themeBtn i').className = next==='light' ? 'ti ti-sun' : 'ti ti-moon';
};

/* ---------- Drawer ---------- */
function closeDrawer(){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').classList.remove('open');}
document.getElementById('menuBtn').onclick = ()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('backdrop').classList.add('open');};
document.getElementById('backdrop').onclick = closeDrawer;

/* ---------- Scroll top ---------- */
const st = document.getElementById('scrollTop');
window.addEventListener('scroll',()=>{st.classList.toggle('show', window.scrollY>400);});
st.onclick = ()=>window.scrollTo({top:0,behavior:'smooth'});

/* ---------- Toast ---------- */
function toast(msg){
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
  wrap.appendChild(el); if(wrap.children.length>3) wrap.removeChild(wrap.firstChild);
  setTimeout(()=>el.remove(),3000);
}

setTimeout(()=>toast('Live market data active'), 800);
